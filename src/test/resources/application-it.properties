spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

spring.flyway.enabled=false

# Enable RabbitMQ for e2e tests
spring.rabbitmq.listener.simple.auto-startup=true

# Polling interval for outbox events - fast for tests
app.outbox.poll-interval-ms=1000
app.outbox.failed-threshold=10

security.jwt.secret=test-secret-key-which-is-long-enough-for-hs256-123456
security.jwt.expiration-ms=3600000

# RabbitMQ messaging queue names (will be overridden by testcontainers host/port)
app.messaging.order-created.queue=techcellshop.order.created.queue
app.messaging.order-created.exchange=techcellshop.order.exchange
app.messaging.order-created.routing-key=order.created