# H2 for tests only
spring.datasource.url=jdbc:h2:mem:techcellshop_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/data-h2.sql

spring.rabbitmq.listener.simple.auto-startup=false

app.messaging.order-created.exchange=techcellshop.order.exchange.test
app.messaging.order-created.routing-key=order.created.test
app.messaging.order-created.queue=techcellshop.order.created.q.test
app.messaging.order-created.dlq=techcellshop.order.created.dlq.test
app.messaging.order-created.dlx=techcellshop.order.exchange.dlx.test
app.messaging.order-created.dlq-routing-key=order.created.dlq.test

# Disable outbox job during tests (24h)
app.outbox.poll-interval-ms=86400000

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.metrics.access=unrestricted

security.jwt.secret=test-secret-key-which-is-long-enough-for-hs256-123456
security.jwt.expiration-ms=3600000